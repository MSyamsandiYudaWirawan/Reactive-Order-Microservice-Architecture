services:
  # ============ INFRASTRUCTURE ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============ DATABASES ============
  auth-db:
    image: postgres:17.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d auth_service_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-db:
    image: postgres:17.5
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d order_service_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory-db:
    image: postgres:17.5
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: inventory_service_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
      - ./inventory-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d inventory_service_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-db:
    image: postgres:17.5
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: payment_service_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d payment_service_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator-db:
    image: postgres:17.5
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: orchestrator_service_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - orchestrator-db-data:/var/lib/postgresql/data
      - ./orchestrator-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d orchestrator_service_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============ PGBOUNCER ============
  auth-pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@auth-db:5432/auth_service_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256

  order-pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      order-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@order-db:5432/order_service_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256

  inventory-pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@inventory-db:5432/inventory_service_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256

  payment-pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@payment-db:5432/payment_service_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256

  orchestrator-pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      orchestrator-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@orchestrator-db:5432/orchestrator_service_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256

  # ============ SERVICES ============
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      auth-pgbouncer:
        condition: service_started
    environment:
      DB_URL: auth-pgbouncer
      DB_PORT: 5432
      DB_NAME: auth_service_db
      DB_USERNAME: username
      DB_PASSWORD: password

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8084

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    depends_on:
      order-pgbouncer:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: order-pgbouncer
      DB_PORT: 5432
      DB_NAME: order_service_db
      DB_USERNAME: username
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  inventory-service:
    build: ./inventory-service
    ports:
      - "8083:8083"
    depends_on:
      inventory-pgbouncer:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: inventory-pgbouncer
      DB_PORT: 5432
      DB_NAME: inventory_service_db
      DB_USERNAME: username
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  payment-service:
    build: ./payment-service
    ports:
      - "8084:8084"
    depends_on:
      payment-pgbouncer:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: payment-pgbouncer
      DB_PORT: 5432
      DB_NAME: payment_service_db
      DB_USERNAME: username
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  orchestrator-service:
    build: ./orchestrator-service
    ports:
      - "8085:8085"
    depends_on:
      orchestrator-pgbouncer:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: orchestrator-pgbouncer
      DB_PORT: 5432
      DB_NAME: orchestrator_service_db
      DB_USERNAME: username
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  auth-db-data:
  order-db-data:
  inventory-db-data:
  payment-db-data:
  orchestrator-db-data:
