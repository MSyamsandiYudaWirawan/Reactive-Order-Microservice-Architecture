services:
  postgres:
    container_name: auth-service
    image: 17.5
    environment:
      POSTGRES_DB: user
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres:
