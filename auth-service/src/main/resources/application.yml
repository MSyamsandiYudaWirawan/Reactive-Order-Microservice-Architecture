spring:
  application:
    name: auth-service
  r2dbc:
    url: r2dbc:postgresql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  level:
    org.springframework.r2dbc: DEBUG


app:
  security:
    jwt:
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000